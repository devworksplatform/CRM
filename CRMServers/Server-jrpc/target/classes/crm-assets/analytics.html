<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Petsfort Analytics</title>
<style>body{font:16px system-ui;background:#f5f7fb;color:#172033;margin:0;padding:2rem}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem}.card{background:white;border-radius:12px;padding:1.25rem;box-shadow:0 4px 20px #13213a12}.value{font-size:2rem;font-weight:700}table{width:100%;border-collapse:collapse}td,th{padding:.6rem;text-align:left;border-bottom:1px solid #e5e9f2}.error{color:#b42318}</style></head>
<body><h1>Petsfort Analytics</h1><p id="status">Loading…</p><section id="cards" class="grid"></section><h2>Low stock</h2><div class="card"><table><thead><tr><th>Product</th><th>Stock</th></tr></thead><tbody id="stock"></tbody></table></div>
<script>const label=s=>s.replaceAll('_',' ').replace(/\b\w/g,c=>c.toUpperCase());fetch('/analytics/summary').then(r=>{if(!r.ok)throw Error(r.status);return r.json()}).then(d=>{status.textContent='Updated '+new Date().toLocaleString();['total_earnings_overall','total_orders_overall','total_orders_this_month','low_stock_products_count'].forEach(k=>{const e=document.createElement('article');e.className='card';e.innerHTML=`<div>${label(k)}</div><div class="value">${d[k]??0}</div>`;cards.append(e)});(d.low_stock_products_list||[]).forEach(p=>stock.insertAdjacentHTML('beforeend',`<tr><td>${p.name}</td><td>${p.stock}</td></tr>`))}).catch(e=>{status.className='error';status.textContent='Could not load analytics: '+e})</script></body></html>
